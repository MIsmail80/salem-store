<div class="flex items-center justify-center relative overflow-hidden"
    style="background-color: #F5F7FA; padding: 2rem; border-radius: 2rem;">
    <style>
        @keyframes blob {
            0% {
                transform: translate(0px, 0px) scale(1);
            }

            33% {
                transform: translate(30px, -50px) scale(1.1);
            }

            66% {
                transform: translate(-20px, 20px) scale(0.9);
            }

            100% {
                transform: translate(0px, 0px) scale(1);
            }
        }

        .animate-blob {
            animation: blob 7s infinite;
        }

        .animation-delay-2000 {
            animation-delay: 2s;
        }

        .animation-delay-4000 {
            animation-delay: 4s;
        }

        .animate-fade-in-up {
            animation: fadeInUp 0.8s ease-out forwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (min-width: 768px) {
            .md-flex-row {
                flex-direction: row !important;
            }

            .md-flex-col {
                flex-direction: column !important;
            }

            .md-w-24 {
                width: 6rem !important;
            }
        }
    </style>

    <!-- Background Blobs -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden z-0 pointer-events-none">
        <div class="absolute -top-24 -left-24 w-96 h-96 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob"
            style="background-color: #e9d5ff;"></div>
        <div class="absolute top-0 right-0 w-96 h-96 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-2000"

        <!-- Content Area -->

            <!-- 2. Contact Form Section -->
            <div class="p-8 lg:p-12 flex flex-col justify-center" style="flex-grow: 1; flex-basis: 300px;">
                <div class="mb-8">
                    <h2 class="text-3xl font-bold mb-2" style="color: #D4AF37;">Contact Us</h2>
                    <p class="text-gray-500">We'd love to hear from you! Send us a message.</p>
                </div>

                <form id="contactForm" action="/contact-us/send-mail" method="POST" style="display: flex; flex-direction: column; gap: 1.5rem;">
                    <input type="hidden" name="_token" id="csrf_token_field">

                    <!-- Name -->
                    <div class="group">
                        <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Name</label>
                        <input type="text" name="name" id="name" required
                            class="w-full px-0 py-2 border-b-2 border-gray-200 focus:border-[#D4AF37] outline-none bg-transparent transition-colors placeholder-gray-300"
                            placeholder="John Doe">
                    </div>

                    <!-- Email -->
                    <div class="group">
                        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">E-mail</label>
                        <input type="email" name="email" id="email" required
                            class="w-full px-0 py-2 border-b-2 border-gray-200 focus:border-[#D4AF37] outline-none bg-transparent transition-colors placeholder-gray-300"
                            placeholder="john@example.com">
                    </div>

                    <!-- Message -->
                    <div class="group">
                        <label for="message" class="block text-sm font-medium text-gray-700 mb-1">Message</label>
                        <textarea name="message" id="message" rows="3" required
                            class="w-full px-3 py-3 rounded-lg bg-gray-50 border border-transparent focus:bg-white focus:border-[#D4AF37] outline-none transition-all placeholder-gray-300 resize-none"
                            placeholder="Write your message here..."></textarea>
                    </div>

                    <!-- Privacy -->
                    <div class="flex items-center space-x-3" dir="ltr">
                        <input id="privacy" type="checkbox" required
                            class="w-4 h-4 text-[#D4AF37] border-gray-300 rounded focus:ring-[#D4AF37]">
                        <label for="privacy" class="font-medium text-gray-700 text-sm m-0 leading-none">

                                style="color: #D4AF37;">privacy policy</a>
                        </label>
                    </div>

                    <!-- Submit Button -->

                        class="w-full text-white font-bold py-3 px-6 rounded-full shadow-lg hover:shadow-xl hover:scale-[1.02] transform transition-all duration-200 flex items-center justify-center">
                        <span>Send Message</span>
                        <svg class="w-5 h-5 ml-2 -mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">

<script>
    // Include CSRF Token Script
    document.addEventListener("DOMContentLoaded", function () {
        const csrfToken = document.querySelector('meta[name="csrf-token"]')?.getAttribute('content');
        if (csrfToken) {
            const tokenInput = document.getElementById('csrf_token_field');
            if (tokenInput) tokenInput.value = csrfToken;
        } else {
            // Try to find token if meta is missing (fallback)
            let knownToken = document.querySelector('input[name="_token"]')?.value;
            if (knownToken) {
                document.getElementById('csrf_token_field').value = knownToken;
            }
        }
    });
</script>
